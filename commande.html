<section class="commande-section">

<h1>Finaliser la commande</h1>

<div class="commande-container">

<form id="commandeForm" class="form-commande">

<label>Nom</label>
<input type="text" id="nom" required>

<label>Téléphone</label>
<input type="text" id="telephone" required>

<label>Adresse de livraison</label>
<input type="text" id="adresse" required>

<label>Ordonnance (optionnel)</label>
<input type="file" id="ordonnance">

<button type="button" onclick="localiser()" class="btn-position">
Partager ma position
</button>

<p id="position"></p>

<div id="carte"></div>

<button type="submit" class="btn-commande">
Envoyer la commande
</button>

</form>


<div class="commande-resume">

<h2>Résumé de la commande</h2>

<div id="resume-panier"></div>

</div>

</div>

</section>
